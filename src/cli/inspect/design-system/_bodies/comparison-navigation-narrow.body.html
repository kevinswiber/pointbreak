<div class="ds-page">
  <div class="ds-group">
    <p class="ds-label">Narrow shell · compact chrome remains mono</p>
    <div class="ds-viewport" data-ds-state="narrow">
      <header id="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">Pointbreak<span class="brand-accent">Review</span></span>
        </div>
        <nav id="lens-switcher" aria-label="master pane lens">
          <button class="lens-tab" type="button" aria-pressed="true">Timeline</button>
          <button class="lens-tab" type="button" aria-pressed="false">Attention</button>
        </nav>
      </header>
      <div class="split">
        <section id="master" class="master" aria-label="master pane">
          <ol class="timeline" aria-label="event timeline">
            <li class="event" aria-selected="true">
              <span class="time">11:03</span>
              <span class="rail" style="background:var(--evt-assessment)"></span>
              <span class="body"><span class="title">accepted with follow-up</span><span class="meta"><span class="type" style="color:var(--evt-assessment)">assessment</span><span>current</span></span></span>
            </li>
          </ol>
        </section>
        <aside id="detail" class="detail"><p class="empty">Detail opens as a sheet at this width.</p></aside>
      </div>
    </div>
  </div>
</div>
